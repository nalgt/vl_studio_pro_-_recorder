<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VL Studio Pro - Recorder</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --purple: #8b5cf6;
            --green: #22c55e;
            --yellow: #f59e0b;
            --bg: #0a0a0a;
            --panel: #141414;
            --panel2: #1c1c1c;
            --border: #252525;
            --text: #d4d4d4;
            --dim: #666;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        #header {
            background: #0f0f0f;
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { font-weight: 700; font-size: 18px; letter-spacing: 3px; color: var(--red); }
        .logo span { color: var(--text); }

        /* PREVIEW AREA */
        #preview-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            min-height: 0;
        }
        #main-video-preview {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }
        #no-video {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* CONTROLS */
        #controls {
            background: var(--panel);
            padding: 15px;
            border-top: 1px solid var(--border);
        }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn {
            background: var(--panel2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }
        .btn.red { border-color: #4a1c1c; color: var(--red); }
        .btn.red:active { background: var(--red); color: white; }
        
        #timer {
            font-family: 'Share Tech Mono', monospace;
            color: var(--yellow);
            font-size: 20px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* TOAST */
        #toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            border: 1px solid var(--border);
            z-index: 1000;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="header">
        <div class="logo">VL <span>STUDIO PRO</span></div>
        <div style="font-size: 10px; color: var(--dim);">420p WEBM MODE</div>
    </div>

    <div id="preview-zone">
        <div id="toast">OBAVEŠTENJE</div>
        <div id="no-video">
            <div style="font-size: 11px; letter-spacing: 5px; color: #333;">NO SIGNAL</div>
        </div>
        <video id="main-video-preview" controls></video>
    </div>

    <div id="controls">
        <div id="timer">00:00:00</div>
        <div class="row">
            <button id="recBtn" class="btn red">START RECORDING</button>
            <button id="stopRecBtn" class="btn red" style="display:none;">STOP & SAVE</button>
        </div>
        <div class="row">
            <button class="btn" onclick="location.reload()">RESET STUDIO</button>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let recStream;
        let startTime;
        let timerInterval;

        const recBtn = document.getElementById('recBtn');
        const stopRecBtn = document.getElementById('stopRecBtn');
        const timerDisplay = document.getElementById('timer');
        const videoPreview = document.getElementById('main-video-preview');
        const noSignal = document.getElementById('no-video');

        // Funkcija za Toast obaveštenja
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Tajmer funkcija
        function updateTimer() {
            const now = Date.now();
            const diff = new Date(now - startTime);
            const h = String(diff.getUTCHours()).padStart(2, '0');
            const m = String(diff.getUTCMinutes()).padStart(2, '0');
            const s = String(diff.getUTCSeconds()).padStart(2, '0');
            timerDisplay.textContent = `${h}:${m}:${s}`;
        }

        // START SNIMANJA
        recBtn.onclick = async () => {
            try {
                // Podešavanja za 420p i Audio
                recStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        width: { ideal: 746 }, 
                        height: { ideal: 420 },
                        frameRate: { ideal: 30 } 
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false
                    }
                });

                // Provera za zvuk
                if (recStream.getAudioTracks().length === 0) {
                    showToast("UPOZORENJE: Nisi štiklirao 'Share Audio'!");
                }

                mediaRecorder = new MediaRecorder(recStream, {
                    mimeType: 'video/webm;codecs=vp8,opus',
                    videoBitsPerSecond: 1500000 // 1.5Mbps (sigurno za 8GB RAM)
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    // Sačuvaj fajl
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `VL_Studio_${Date.now()}.webm`;
                    a.click();

                    // Prikaži u preview-u
                    videoPreview.src = url;
                    videoPreview.style.display = 'block';
                    noSignal.style.display = 'none';

                    // Reset UI
                    recordedChunks = [];
                    recBtn.style.display = 'block';
                    stopRecBtn.style.display = 'none';
                    clearInterval(timerInterval);
                    timerDisplay.textContent = "00:00:00";
                    showToast("SNIMAK SAČUVAN");
                };

                mediaRecorder.start();
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                
                recBtn.style.display = 'none';
                stopRecBtn.style.display = 'block';
                showToast("SNIMANJE...");

                // Detekcija ako korisnik prekine na dugme u browseru
                recStream.getVideoTracks()[0].onended = () => stopRecBtn.click();

            } catch (err) {
                showToast("GREŠKA: Pristup odbijen");
            }
        };

        // STOP SNIMANJA
        stopRecBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                recStream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
</html>
